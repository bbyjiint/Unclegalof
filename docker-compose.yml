# Explicit name avoids "project name must not be empty" when the folder path is non-ASCII.
# If `docker compose up --build` fails with Buildx gRPC / non-printable ASCII headers, use:
#   npm run docker:up   or   sh scripts/docker.sh up --build
# If host ports are busy: `docker compose down` / stop local dev, or override e.g.
#   HOST_API_PORT=4002 HOST_CLIENT_PORT=5174 npm run docker:up
# root_node_modules persists across runs; server entrypoint runs `npm ci` when there is
# no stamp or package-lock.json is newer, so new deps (e.g. lucide-react) sync without `down -v`.
#
# Postgres runs in the `db` service; the API uses DATABASE_URL pointing at hostname `db`.
# Override host DB port if 5433 is taken: HOST_DB_PORT=5434 docker compose up
name: to-lopburi

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tolopburi
      POSTGRES_PASSWORD: tolopburi_dev
      POSTGRES_DB: tolopburi
    ports:
      - "${HOST_DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tolopburi -d tolopburi"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command:
      - sh
      - -c
      - |
        set -e
        if [ ! -f node_modules/.docker-npm-stamp ] || [ package-lock.json -nt node_modules/.docker-npm-stamp ]; then
          npm ci
          touch node_modules/.docker-npm-stamp
        fi
        npm run prisma:generate --workspace server
        npm run prisma:migrate:deploy --workspace server
        exec npm run dev --workspace server
    ports:
      - "${HOST_API_PORT:-4001}:4001"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    environment:
      PORT: 4001
      CLIENT_ORIGIN: http://localhost:${HOST_CLIENT_PORT:-5173}
      DATABASE_URL: postgresql://tolopburi:tolopburi_dev@db:5432/tolopburi
      DIRECT_URL: postgresql://tolopburi:tolopburi_dev@db:5432/tolopburi
      JWT_SECRET: ${JWT_SECRET:-docker-dev-change-me-to-a-long-random-secret-min-32-chars}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:'+(process.env.PORT||4001)+'/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 240s

  client:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: sh -c "npm run dev --workspace client -- --host 0.0.0.0 --port 5173"
    ports:
      - "${HOST_CLIENT_PORT:-5173}:5173"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    environment:
      VITE_PROXY_TARGET: http://server:4001
    depends_on:
      server:
        condition: service_healthy

volumes:
  root_node_modules:
  pgdata:
